name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Run Python Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Install Dependencies
        run: uv sync --all-extras --dev
          
      - name: Run Pytest
        run: uv run pytest tests/
